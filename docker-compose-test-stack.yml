# Dina Unified Test Stack — Actor Home Nodes only.
#
# Infrastructure (PDS, MsgBox, AppView, PLC) runs on Hetzner test servers:
#   PDS:     https://test-pds.dinakernel.com
#   MsgBox:  wss://test-mailbox.dinakernel.com
#   AppView: https://test-appview.dinakernel.com
#   PLC:     https://plc.directory
#
# This compose runs 5 actor Home Nodes (Core+Brain) + a dummy-agent.
# Every actor registers with the real test PDS, gets a did:plc from the
# public PLC, and communicates via the real test MsgBox relay.
#
# WARNING: TESTING ONLY. Contains hardcoded seeds, test credentials, and
# DINA_TEST_MODE=true / DINA_RATE_LIMIT=100000. Do NOT deploy in production.
#
# Usage:
#   docker compose -f docker-compose-test-stack.yml up --build -d
#   <run tests>
#   docker compose -f docker-compose-test-stack.yml down -v

# ============================================================================
# YAML Anchors — shared config blocks reused across services
# ============================================================================

# -- Core service base (Go vault keeper) --
x-core-base: &core-base
  build:
    context: ./core
    dockerfile: Dockerfile
    additional_contexts:
      admin-cli: ./admin-cli
  healthcheck: &core-healthcheck
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:8100/healthz"]
    interval: 5s
    timeout: 5s
    retries: 15
    start_period: 10s
  networks:
    - test-net

# -- Core environment shared vars (all infra URLs point to Hetzner) --
x-core-env: &core-env
  DINA_SERVICE_KEY_DIR: /run/secrets/service_keys
  DINA_LISTEN_ADDR: ":8100"
  DINA_VAULT_PATH: /data/vault
  DINA_RATE_LIMIT: "100000"
  DINA_SPOOL_MAX: "10485760"
  DINA_LOG_LEVEL: debug
  DINA_TEST_MODE: "true"
  DINA_ENV: test
  DINA_CLIENT_TOKEN_FILE: /run/secrets/client_token
  DINA_APPVIEW_URL: https://test-appview.dinakernel.com
  DINA_PLC_URL: https://plc.directory
  DINA_PDS_URL: https://test-pds.dinakernel.com
  DINA_MSGBOX_URL: "wss://test-mailbox.dinakernel.com"

# -- Brain service base (Python sidecar) --
x-brain-base: &brain-base
  build:
    context: ./brain
    dockerfile: Dockerfile
  healthcheck: &brain-healthcheck
    test: ["CMD", "python", "-c", "import sys; from urllib.request import urlopen; r = urlopen('http://localhost:8200/healthz', timeout=2); sys.exit(0 if r.status == 200 else 1)"]
    interval: 10s
    timeout: 10s
    retries: 15
    start_period: 5s
  networks:
    - test-net

# -- Brain environment shared vars --
x-brain-env: &brain-env
  DINA_SERVICE_KEY_DIR: /run/secrets/service_keys
  DINA_BRAIN_PORT: "8200"
  DINA_LOG_LEVEL: DEBUG
  DINA_TEST_MODE: "true"
  GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
  OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"

# -- Keygen init container base (derives SLIP-0010 service keys from seed) --
x-keygen-base: &keygen-base
  build:
    context: ./scripts
    dockerfile: Dockerfile.keygen
  entrypoint: ["sh", "-c"]
  command:
    - >
      python /tmp/provision.py /tmp/keys &&
      cp /tmp/keys/core/* /keys-core-priv/ &&
      cp /tmp/keys/brain/* /keys-brain-priv/ &&
      cp /tmp/keys/public/* /keys-pub/
  restart: "no"
  networks:
    - test-net

# ============================================================================
# Services — Actors only (infrastructure is on Hetzner)
# ============================================================================

services:

  # ==========================================================================
  # Keygen Init Containers — provision SLIP-0010 service keys per actor
  # ==========================================================================

  keygen-alonso:
    <<: *keygen-base
    environment:
      DINA_SEED_HEX: "0101010101010101010101010101010101010101010101010101010101010101"
    volumes:
      - ./scripts/provision_derived_service_keys.py:/tmp/provision.py:ro
      - alonso-keys-core-priv:/keys-core-priv
      - alonso-keys-brain-priv:/keys-brain-priv
      - alonso-keys-pub:/keys-pub

  keygen-sancho:
    <<: *keygen-base
    environment:
      DINA_SEED_HEX: "0202020202020202020202020202020202020202020202020202020202020202"
    volumes:
      - ./scripts/provision_derived_service_keys.py:/tmp/provision.py:ro
      - sancho-keys-core-priv:/keys-core-priv
      - sancho-keys-brain-priv:/keys-brain-priv
      - sancho-keys-pub:/keys-pub

  keygen-chairmaker:
    <<: *keygen-base
    environment:
      DINA_SEED_HEX: "0303030303030303030303030303030303030303030303030303030303030303"
    volumes:
      - ./scripts/provision_derived_service_keys.py:/tmp/provision.py:ro
      - chairmaker-keys-core-priv:/keys-core-priv
      - chairmaker-keys-brain-priv:/keys-brain-priv
      - chairmaker-keys-pub:/keys-pub

  keygen-albert:
    <<: *keygen-base
    environment:
      DINA_SEED_HEX: "0404040404040404040404040404040404040404040404040404040404040404"
    volumes:
      - ./scripts/provision_derived_service_keys.py:/tmp/provision.py:ro
      - albert-keys-core-priv:/keys-core-priv
      - albert-keys-brain-priv:/keys-brain-priv
      - albert-keys-pub:/keys-pub

  keygen-busdriver:
    <<: *keygen-base
    environment:
      DINA_SEED_HEX: "0505050505050505050505050505050505050505050505050505050505050505"
    volumes:
      - ./scripts/provision_derived_service_keys.py:/tmp/provision.py:ro
      - busdriver-keys-core-priv:/keys-core-priv
      - busdriver-keys-brain-priv:/keys-brain-priv
      - busdriver-keys-pub:/keys-pub

  # ==========================================================================
  # Actor 1: Don Alonso (primary user) — Core port 19100, Brain port 19200
  # ==========================================================================

  alonso-core:
    <<: *core-base
    ports:
      - "19100:8100"
    environment:
      <<: *core-env
      DINA_BRAIN_URL: http://alonso-brain:8200
      DINA_MASTER_SEED: "0101010101010101010101010101010101010101010101010101010101010101"
      DINA_PDS_HANDLE: "alonso.test-pds.dinakernel.com"
      DINA_PDS_ADMIN_PASSWORD: "2c9fcd3feee602ed2726155590d7e9b1"
      DINA_PDS_EMAIL: "alonso@test.dina.local"
      DINA_ALLOWED_ENDPOINTS: "http://sancho-core:8100,http://chairmaker-core:8100,http://albert-core:8100,http://busdriver-core:8100"
    volumes:
      - alonso-data:/data
      - alonso-keys-core-priv:/run/secrets/service_keys/private:ro
      - alonso-keys-pub:/run/secrets/service_keys/public:ro
      - ./secrets/client_token:/run/secrets/client_token:ro
    depends_on:
      alonso-brain:
        condition: service_healthy
      keygen-alonso:
        condition: service_completed_successfully

  alonso-brain:
    <<: *brain-base
    ports:
      - "19200:8200"
    environment:
      <<: *brain-env
      DINA_CORE_URL: http://alonso-core:8100
      DINA_APPVIEW_URL: https://test-appview.dinakernel.com
    volumes:
      - alonso-data:/data
      - alonso-keys-brain-priv:/run/secrets/service_keys/private:ro
      - alonso-keys-pub:/run/secrets/service_keys/public:ro
      - ./models.json:/app/models.json:ro
    depends_on:
      keygen-alonso:
        condition: service_completed_successfully

  # ==========================================================================
  # Actor 2: Sancho (trusted friend) — Core port 19300, Brain port 19400
  # ==========================================================================

  sancho-core:
    <<: *core-base
    ports:
      - "19300:8100"
    environment:
      <<: *core-env
      DINA_BRAIN_URL: http://sancho-brain:8200
      DINA_MASTER_SEED: "0202020202020202020202020202020202020202020202020202020202020202"
      DINA_PDS_HANDLE: "sancho.test-pds.dinakernel.com"
      DINA_PDS_ADMIN_PASSWORD: "2c9fcd3feee602ed2726155590d7e9b1"
      DINA_PDS_EMAIL: "sancho@test.dina.local"
      DINA_ALLOWED_ENDPOINTS: "http://alonso-core:8100,http://chairmaker-core:8100,http://albert-core:8100,http://busdriver-core:8100"
    volumes:
      - sancho-data:/data
      - sancho-keys-core-priv:/run/secrets/service_keys/private:ro
      - sancho-keys-pub:/run/secrets/service_keys/public:ro
      - ./secrets/client_token:/run/secrets/client_token:ro
    depends_on:
      sancho-brain:
        condition: service_healthy
      keygen-sancho:
        condition: service_completed_successfully

  sancho-brain:
    <<: *brain-base
    ports:
      - "19400:8200"
    environment:
      <<: *brain-env
      DINA_CORE_URL: http://sancho-core:8100
    volumes:
      - sancho-data:/data
      - sancho-keys-brain-priv:/run/secrets/service_keys/private:ro
      - sancho-keys-pub:/run/secrets/service_keys/public:ro
      - ./models.json:/app/models.json:ro
    depends_on:
      keygen-sancho:
        condition: service_completed_successfully

  # ==========================================================================
  # Actor 3: ChairMaker (vendor/seller) — Core port 19500, Brain port 19600
  # ==========================================================================

  chairmaker-core:
    <<: *core-base
    ports:
      - "19500:8100"
    environment:
      <<: *core-env
      DINA_BRAIN_URL: http://chairmaker-brain:8200
      DINA_MASTER_SEED: "0303030303030303030303030303030303030303030303030303030303030303"
      DINA_PDS_HANDLE: "chairmaker.test-pds.dinakernel.com"
      DINA_PDS_ADMIN_PASSWORD: "2c9fcd3feee602ed2726155590d7e9b1"
      DINA_PDS_EMAIL: "chairmaker@test.dina.local"
      DINA_ALLOWED_ENDPOINTS: "http://alonso-core:8100,http://sancho-core:8100,http://albert-core:8100,http://busdriver-core:8100"
    volumes:
      - chairmaker-data:/data
      - chairmaker-keys-core-priv:/run/secrets/service_keys/private:ro
      - chairmaker-keys-pub:/run/secrets/service_keys/public:ro
      - ./secrets/client_token:/run/secrets/client_token:ro
    depends_on:
      chairmaker-brain:
        condition: service_healthy
      keygen-chairmaker:
        condition: service_completed_successfully

  chairmaker-brain:
    <<: *brain-base
    ports:
      - "19600:8200"
    environment:
      <<: *brain-env
      DINA_CORE_URL: http://chairmaker-core:8100
    volumes:
      - chairmaker-data:/data
      - chairmaker-keys-brain-priv:/run/secrets/service_keys/private:ro
      - chairmaker-keys-pub:/run/secrets/service_keys/public:ro
      - ./models.json:/app/models.json:ro
    depends_on:
      keygen-chairmaker:
        condition: service_completed_successfully

  # ==========================================================================
  # Actor 4: Albert (contact) — Core port 19700, Brain port 19800
  # ==========================================================================

  albert-core:
    <<: *core-base
    ports:
      - "19700:8100"
    environment:
      <<: *core-env
      DINA_BRAIN_URL: http://albert-brain:8200
      DINA_MASTER_SEED: "0404040404040404040404040404040404040404040404040404040404040404"
      DINA_PDS_HANDLE: "albert.test-pds.dinakernel.com"
      DINA_PDS_ADMIN_PASSWORD: "2c9fcd3feee602ed2726155590d7e9b1"
      DINA_PDS_EMAIL: "albert@test.dina.local"
      DINA_ALLOWED_ENDPOINTS: "http://alonso-core:8100,http://sancho-core:8100,http://chairmaker-core:8100,http://busdriver-core:8100"
    volumes:
      - albert-data:/data
      - albert-keys-core-priv:/run/secrets/service_keys/private:ro
      - albert-keys-pub:/run/secrets/service_keys/public:ro
      - ./secrets/client_token:/run/secrets/client_token:ro
    depends_on:
      albert-brain:
        condition: service_healthy
      keygen-albert:
        condition: service_completed_successfully

  albert-brain:
    <<: *brain-base
    ports:
      - "19800:8200"
    environment:
      <<: *brain-env
      DINA_CORE_URL: http://albert-core:8100
    volumes:
      - albert-data:/data
      - albert-keys-brain-priv:/run/secrets/service_keys/private:ro
      - albert-keys-pub:/run/secrets/service_keys/public:ro
      - ./models.json:/app/models.json:ro
    depends_on:
      keygen-albert:
        condition: service_completed_successfully

  # ==========================================================================
  # Actor 5: BusDriver (transit provider) — Core port 19900, Brain port 20000
  # ==========================================================================

  busdriver-core:
    <<: *core-base
    ports:
      - "19900:8100"
    environment:
      <<: *core-env
      DINA_BRAIN_URL: http://busdriver-brain:8200
      DINA_MASTER_SEED: "0505050505050505050505050505050505050505050505050505050505050505"
      DINA_HOOK_CALLBACK_TOKEN: "${DINA_HOOK_CALLBACK_TOKEN:-dina-callback-busdriver}"
      DINA_PDS_HANDLE: "busdriver.test-pds.dinakernel.com"
      DINA_PDS_ADMIN_PASSWORD: "2c9fcd3feee602ed2726155590d7e9b1"
      DINA_PDS_EMAIL: "busdriver@test.dina.local"
      DINA_ALLOWED_ENDPOINTS: "http://alonso-core:8100,http://sancho-core:8100,http://chairmaker-core:8100,http://albert-core:8100"
    volumes:
      - busdriver-data:/data
      - busdriver-keys-core-priv:/run/secrets/service_keys/private:ro
      - busdriver-keys-pub:/run/secrets/service_keys/public:ro
      - ./secrets/client_token:/run/secrets/client_token:ro
    depends_on:
      busdriver-brain:
        condition: service_healthy
      keygen-busdriver:
        condition: service_completed_successfully

  busdriver-brain:
    <<: *brain-base
    ports:
      - "20000:8200"
    environment:
      <<: *brain-env
      DINA_CORE_URL: http://busdriver-core:8100
      DINA_APPVIEW_URL: https://test-appview.dinakernel.com
      DINA_MCP_SERVERS: '{"transit": ["python3", "-m", "demo.transit"]}'
    volumes:
      - busdriver-data:/data
      - busdriver-keys-brain-priv:/run/secrets/service_keys/private:ro
      - busdriver-keys-pub:/run/secrets/service_keys/public:ro
      - ./models.json:/app/models.json:ro
      - ./demo/transit:/app/demo/transit:ro
    depends_on:
      keygen-busdriver:
        condition: service_completed_successfully

  # ==========================================================================
  # BusDriver OpenClaw — transit MCP tool executor
  # ==========================================================================
  # NOTE: Requires manual pairing step after Core is running:
  #   1. Get pairing code: curl -s -X POST http://localhost:19900/v1/pair/initiate -H "Authorization: Bearer <client_token>" -d '{"device_name":"busdriver-openclaw","role":"agent"}'
  #   2. Set DINA_PAIRING_CODE env and restart: docker compose -f docker-compose-test-stack.yml up -d busdriver-openclaw

  busdriver-openclaw:
    build:
      context: .
      dockerfile: tests/sanity/Dockerfile.openclaw
    environment:
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      DINA_CORE_URL: http://busdriver-core:8100
      DINA_PAIRING_CODE: "${BUSDRIVER_PAIRING_CODE:-}"
      DINA_HOOK_CALLBACK_TOKEN: "${DINA_HOOK_CALLBACK_TOKEN:-dina-callback-busdriver}"
      OPENCLAW_TOKEN: "busdriver-oc-token"
      PYTHONPATH: /app
    volumes:
      - ./demo/transit:/app/demo/transit:ro
      - ./demo/transit/openclaw-setup.sh:/usr/local/bin/openclaw-setup.sh:ro
    networks:
      - test-net
    depends_on:
      busdriver-core:
        condition: service_healthy

  # ==========================================================================
  # Dummy Agent — CLI container for pairing and agent testing
  # ==========================================================================

  dummy-agent:
    build:
      context: ./cli
      dockerfile: Dockerfile
    command: ["sleep", "infinity"]
    volumes:
      - ./secrets/client_token:/run/secrets/client_token:ro
      - alonso-keys-pub:/keys-pub:ro
    environment:
      DINA_CORE_URL: http://alonso-core:8100
    networks:
      - test-net

# ============================================================================
# Volumes — actor data + keys only (no infrastructure volumes)
# ============================================================================

volumes:
  # Actor data (encrypted vault files)
  alonso-data:
  sancho-data:
  chairmaker-data:
  albert-data:
  busdriver-data:

  # Actor keys — isolated per service (Core private, Brain private, shared public)
  alonso-keys-core-priv:
  alonso-keys-brain-priv:
  alonso-keys-pub:

  sancho-keys-core-priv:
  sancho-keys-brain-priv:
  sancho-keys-pub:

  chairmaker-keys-core-priv:
  chairmaker-keys-brain-priv:
  chairmaker-keys-pub:

  albert-keys-core-priv:
  albert-keys-brain-priv:
  albert-keys-pub:

  busdriver-keys-core-priv:
  busdriver-keys-brain-priv:
  busdriver-keys-pub:

# ============================================================================
# Networks — single flat bridge for all actor services
# ============================================================================

networks:
  test-net:
    driver: bridge
