# PII Allow-List — tokens that must NEVER be scrubbed.
# Organized by category. Extend per deployment.
#
# These are common false positives from NER models and pattern recognizers.
# V1: used as a post-filter on Presidio pattern results.
# V2: will also filter GLiNER NER results.

