# Production Docker Compose for managed hosting.
# Same containers as dev, with production settings:
# - restart: always, resource limits, log rotation, TLS termination.

services:
  core:
    image: dina-core:latest
    restart: always
    ports:
      - "8300:8300"
    volumes:
      - dina-data:/data
      - dina-core-keys:/run/secrets/service_keys/private
      - dina-service-keys-public:/run/secrets/service_keys/public
    environment:
      - DINA_BRAIN_URL=http://brain:8200
      - DINA_VAULT_PATH=/data/vault
      - DINA_SERVICE_KEY_DIR=/run/secrets/service_keys
      - DINA_SERVICE_KEY_INIT=1
      - DINA_SERVICE_KEY_STRICT=1

  brain:
    image: dina-brain:latest
    restart: always
    expose:
      - "8200"
    volumes:
      - dina-brain-keys:/run/secrets/service_keys/private
      - dina-service-keys-public:/run/secrets/service_keys/public
    environment:
      - DINA_CORE_URL=http://core:8300
      - DINA_SERVICE_KEY_DIR=/run/secrets/service_keys
      - DINA_SERVICE_KEY_INIT=1
      - DINA_SERVICE_KEY_STRICT=1

  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    restart: always
    expose:
      - "8080"
    volumes:
      - dina-models:/models

volumes:
  dina-data:
  dina-models:
  dina-core-keys:
  dina-brain-keys:
  dina-service-keys-public:
