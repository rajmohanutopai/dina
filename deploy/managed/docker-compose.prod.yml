# Production Docker Compose for managed hosting.
# Same containers as dev, with production settings:
# - restart: always, resource limits, log rotation, TLS termination.

services:
  core:
    image: dina-core:latest
    restart: always
    ports:
      - "8300:8300"
    volumes:
      - dina-data:/data
    secrets:
      - brain_token
    environment:
      - BRAIN_URL=http://brain:8200
      - DINA_DATA_DIR=/data

  brain:
    image: dina-brain:latest
    restart: always
    expose:
      - "8200"
    secrets:
      - brain_token
    environment:
      - CORE_URL=http://core:8300

  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    restart: always
    expose:
      - "8080"
    volumes:
      - dina-models:/models

volumes:
  dina-data:
  dina-models:

secrets:
  brain_token:
    file: ../../secrets/brain_token
