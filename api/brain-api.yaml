          nullable: true
        source:
          title: Source
          type: string
          nullable: true
        type:
          type: string
          title: Type
        body:
          title: Body
          type: object
          additionalProperties: true
          nullable: true
        priority:
          title: Priority
          type: string
          nullable: true
        from:
          title: From
          type: string
          nullable: true
        contact_did:
          title: Contact Did
          type: string
          nullable: true
        agent_did:
          title: Agent Did
          type: string
          nullable: true
        action:
          title: Action
          type: string
          nullable: true
        target:
          title: Target
          type: string
          nullable: true
        risk_level:
          title: Risk Level
          type: string
          nullable: true
        trust_level:
          title: Trust Level
          type: string
          nullable: true
        payload:
          title: Payload
          additionalProperties: true
          type: object
          nullable: true
        context:
          title: Context
          additionalProperties: true
          type: object
          nullable: true
      type: object
      required:
      - type
      title: StandardEvent
      description: 'Catch-all for standard events (message, alert, notification, reminder)

        and DIDComm messages (dina/social/*, dina/commerce/*, etc.).


        DIDComm types use dynamic prefixes that can''t be Literal variants.

        Standard events flow through the silence classifier.'
    ValidationError:
      properties:
        loc:
          items:
            type: object
            additionalProperties: true
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
