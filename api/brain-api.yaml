    ScrubRequest:
      properties:
        text:
          type: string
          maxLength: 100000
          title: Text
      type: object
      required:
      - text
      title: ScrubRequest
      description: Input text for PII scrubbing.
    ScrubResponse:
      properties:
        scrubbed:
          type: string
          title: Scrubbed
        entities:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Entities
      type: object
      required:
      - scrubbed
      - entities
      title: ScrubResponse
      description: Result of PII scrubbing.
    StandardEvent:
      properties:
        task_id:
          title: Task Id
          type: string
          nullable: true
        timestamp:
          title: Timestamp
          type: string
          nullable: true
        persona_id:
          title: Persona Id
