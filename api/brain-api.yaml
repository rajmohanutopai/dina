openapi: 3.0.3
info:
  title: Dina Brain API
  description: Internal API for dina-core to delegate processing and reasoning.
  version: 0.4.0
paths:
  /v1/process:
    post:
      summary: Process Event
      description: 'Process an incoming event from core.


        The request body is validated against typed event variants based on

        the ``type`` field.  Known types (agent_intent, vault_unlocked, etc.)

        get strict schema validation.  Unknown types and DIDComm messages

        (dina/*) fall through to the permissive StandardEvent model.


        Delegates to GuardianLoop.process_event() and translates the returned

        dict into a typed ProcessEventResponse.'
      operationId: process_event_v1_process_post
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/VaultUnlockedEvent'
              - $ref: '#/components/schemas/VaultLockedEvent'
              - $ref: '#/components/schemas/PersonaUnlockedEvent'
              - $ref: '#/components/schemas/AgentIntentEvent'
              - $ref: '#/components/schemas/DelegationRequestEvent'
              - $ref: '#/components/schemas/CrossPersonaRequestEvent'
              - $ref: '#/components/schemas/IntentApprovedEvent'
              - $ref: '#/components/schemas/DisclosureApprovedEvent'
              - $ref: '#/components/schemas/DocumentIngestEvent'
              - $ref: '#/components/schemas/ReminderFiredEvent'
              - $ref: '#/components/schemas/ApprovalNeededEvent'
              - $ref: '#/components/schemas/AgentResponseEvent'
              - $ref: '#/components/schemas/ReasonEvent'
              - $ref: '#/components/schemas/ContactNeglectEvent'
              - $ref: '#/components/schemas/PostPublishEvent'
              - $ref: '#/components/schemas/StandardEvent'
              title: Event
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessEventResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/reason:
    post:
      summary: Reason Query
      description: "Handle a complex query from core requiring LLM reasoning.\n\n\
        Pipeline:\n    1. Generate query embedding (if LLM supports it)\n    2. Call\
        \ core for hybrid search (FTS5 + semantic)\n    3. Assemble context from results\n\
        \    4. PII-scrub context for cloud LLM (skip if local)\n    5. Call LLM with\
        \ assembled context\n    6. Rehydrate response (replace PII tokens with originals)\n\
        \    7. Return answer\n\nRaises\n------\nHTTPException 503\n    If the guardian\
        \ loop is not initialised.\nHTTPException 500\n    If an unexpected error\
        \ occurs during reasoning."
      operationId: reason_query_v1_reason_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReasonRequest'
        required: true
      responses:
        '200':
          description: Immediate reasoning response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReasonResponse'
        '202':
          description: Approval required — Core creates pending record, CLI polls.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending_approval]
                  approval_id:
                    type: string
                  persona:
                    type: string
                  message:
                    type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/pii/scrub:
    post:
      summary: Scrub Pii
      description: "Scrub PII from the provided text using Tier 2 NER.\n\nIf no scrubber\
        \ is available (spaCy not installed), returns\nthe text unchanged with an\
        \ empty entity list.\n\nReturns\n-------\nScrubResponse\n    ``scrubbed``\
        \ text and a list of ``entities`` with keys\n    ``type``, ``value``, and\
        \ ``token``."
      operationId: scrub_pii_v1_pii_scrub_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrubRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrubResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
