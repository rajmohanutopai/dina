          type: string
          maxLength: 32000
          title: Prompt
        persona_id:
          title: Persona Id
          type: string
          maxLength: 100
          nullable: true
        persona_tier:
          title: Persona Tier
          default: default
          type: string
          enum:
          - default
          - standard
          - sensitive
          - locked
          nullable: true
        provider:
          title: Provider
          type: string
          maxLength: 50
          nullable: true
        skip_vault_enrichment:
          type: boolean
          title: Skip Vault Enrichment
          default: false
        agent_did:
          title: Agent Did
          type: string
          maxLength: 200
          nullable: true
        session:
          title: Session
          type: string
          maxLength: 200
          nullable: true
        source:
          title: Source
          type: string
          maxLength: 50
          nullable: true
      type: object
      required:
      - prompt
      title: ReasonRequest
      description: 'Complex reasoning query from core.


        The ``prompt`` field is always required.  The optional fields allow

        core to pass persona context for privacy-aware LLM routing.'
    ReasonResponse:
      properties:
        content:
          type: string
          title: Content
        model:
          title: Model
          type: string
          nullable: true
        tokens_in:
          title: Tokens In
          type: integer
          nullable: true
        tokens_out:
          title: Tokens Out
          type: integer
          nullable: true
        vault_context_used:
          type: boolean
          title: Vault Context Used
          default: false
      type: object
      required:
      - content
      title: ReasonResponse
      description: 'LLM reasoning result returned to core.


        ``content`` contains the rehydrated (PII-restored) answer.

        Token counts and model name are included for observability.

        ``vault_context_used`` indicates whether the agentic reasoning loop

        successfully queried persona vaults for personalization context.'
