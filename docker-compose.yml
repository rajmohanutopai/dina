# Dina Home Node — Docker Compose
# 4 services: core (Go), brain (Python), pds (AT Protocol), llm (optional)
# + plc (fake PLC directory, test-only profile)
#
# Usage:
#   ./install.sh              # first-time setup
#   docker compose up -d      # start all services (real plc.directory)
#   docker compose logs -f    # tail logs
#
# Testing with local fake PLC (no internet, no pollution):
#   DINA_PLC_URL=http://plc:2582 docker compose --profile test-plc up -d

services:
  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    ports:
      - "${DINA_CORE_PORT:-8100}:8100"
    volumes:
      - dina-data:/data
    environment:
      - DINA_VAULT_PATH=/data/vault
      - DINA_BRAIN_URL=http://brain:8200
      - DINA_BRAIN_TOKEN_FILE=/run/secrets/brain_token
      - DINA_LISTEN_ADDR=:8100
      - DINA_IDENTITY_SEED=${DINA_IDENTITY_SEED:-}
      - DINA_RATE_LIMIT=${DINA_RATE_LIMIT:-100}
      - DINA_SPOOL_MAX=${DINA_SPOOL_MAX:-10485760}
      - DINA_PDS_URL=http://pds:3000
      - DINA_PLC_URL=${DINA_PLC_URL:-https://plc.directory}
      - DINA_PDS_ADMIN_PASSWORD=${DINA_PDS_ADMIN_PASSWORD:-}
      - DINA_PDS_HANDLE=${DINA_PDS_HANDLE:-dina.localhost}
    secrets:
      - brain_token
    depends_on:
      brain:
        condition: service_healthy
      pds:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  brain:
    build:
      context: ./brain
      dockerfile: Dockerfile
    ports:
      - "${DINA_BRAIN_PORT:-8200}:8200"
    volumes:
      - dina-data:/data
      - ./dina.html:/app/dina.html:ro
      - ./images:/app/images:ro
    environment:
      - DINA_CORE_URL=http://core:8100
      - DINA_BRAIN_TOKEN_FILE=/run/secrets/brain_token
      - DINA_BRAIN_PORT=8200
      - DINA_LLM_URL=${DINA_LLM_URL:-http://llm:8080}
      - DINA_LOG_LEVEL=${DINA_LOG_LEVEL:-INFO}
      - DINA_CLOUD_LLM=${DINA_CLOUD_LLM:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
    secrets:
      - brain_token
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8200/healthz').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  plc:
    build:
      context: ./plc
      dockerfile: Dockerfile
    ports:
      - "${DINA_PLC_PORT:-2582}:2582"
    profiles:
      - test-plc
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2582/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  pds:
    image: ghcr.io/bluesky-social/pds:0.4
    ports:
      - "${DINA_PDS_PORT:-2583}:3000"
    volumes:
      - pds-data:/pds
    environment:
      - PDS_HOSTNAME=${DINA_PDS_HOSTNAME:-localhost}
      - PDS_PORT=3000
      - PDS_DATA_DIRECTORY=/pds
      - PDS_BLOBSTORE_DISK_LOCATION=/pds/blocks
      - PDS_DID_PLC_URL=${DINA_PLC_URL:-https://plc.directory}
      - PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX=${DINA_PDS_ROTATION_KEY_HEX:-}
      - PDS_JWT_SECRET=${DINA_PDS_JWT_SECRET:-}
      - PDS_ADMIN_PASSWORD=${DINA_PDS_ADMIN_PASSWORD:-}
      - PDS_DEV_MODE=true
      - PDS_INVITE_REQUIRED=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/xrpc/_health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "${DINA_LLM_PORT:-8080}:8080"
    volumes:
      - dina-models:/models
    command: >
      --host 0.0.0.0
      --port 8080
      --model /models/${DINA_LLM_MODEL:-gemma-2b-it-q4_k_m.gguf}
      --ctx-size 4096
      --n-gpu-layers 999
    profiles:
      - local-llm
    restart: unless-stopped

volumes:
  dina-data:
    driver: local
  pds-data:
    driver: local
  dina-models:
    driver: local

secrets:
  brain_token:
    file: ./secrets/brain_token
