# Dina Home Node — Docker Compose
# 4 services: core (Go), brain (Python), pds (AT Protocol), llm (optional)
# + plc (fake PLC directory, test-only profile)
#
# Usage:
#   ./install.sh              # first-time setup (creates secrets, .env, builds, starts)
#   docker compose up -d      # restart after install (requires ./install.sh first)
#   docker compose logs -f    # tail logs
#
# If you see "bind source path does not exist: .../secrets/service_keys",
# run ./install.sh first — it generates the required secrets and key directories.
#
# Service key isolation: each service's private key directory is bind-mounted
# separately (core/ and brain/). Public keys share a common directory (public/).
# This means Core's private key never exists in Brain's filesystem and vice versa.
#
# Testing with local fake PLC (no internet, no pollution):
#   DINA_PLC_URL=http://plc:2582 docker compose --profile test-plc up -d

services:
  core:
    container_name: core-${DINA_SESSION:-dna}
    build:
      context: ./core
      dockerfile: Dockerfile
      args:
        DINA_VERSION: "${DINA_VERSION:-dev}"
      additional_contexts:
        admin-cli: ./admin-cli
    ports:
      - "${DINA_CORE_PORT:-8100}:8100"
    volumes:
      - dina-data:/data
      - ${DINA_SECRETS_DIR:-./secrets}/service_keys/core:/run/secrets/service_keys/private
      - ${DINA_SECRETS_DIR:-./secrets}/service_keys/public:/run/secrets/service_keys/public:ro
    environment:
      - DINA_ENV=${DINA_ENV:-development}
      - DINA_VAULT_PATH=/data/vault
      - DINA_BRAIN_URL=http://brain:8200
      - DINA_CLIENT_TOKEN=${DINA_CLIENT_TOKEN:-}
      - DINA_SERVICE_KEY_DIR=/run/secrets/service_keys
      - DINA_LISTEN_ADDR=:8100
      - DINA_SEED_PASSWORD=${DINA_SEED_PASSWORD:-}
      - DINA_RATE_LIMIT=${DINA_RATE_LIMIT:-100}
      - DINA_SPOOL_MAX=${DINA_SPOOL_MAX:-10485760}
      - DINA_PDS_URL=${DINA_COMMUNITY_PDS_URL:-https://pds.dinakernel.com}
      - DINA_PLC_URL=${DINA_PLC_URL:-https://plc.directory}
      - DINA_PDS_ADMIN_PASSWORD=${DINA_COMMUNITY_PDS_PASSWORD:-}
      - DINA_PDS_HANDLE=${DINA_COMMUNITY_PDS_HANDLE:-}
      - DINA_PDS_EMAIL=${DINA_PDS_EMAIL:-dina@example.com}
      - DINA_MSGBOX_URL=${DINA_MSGBOX_URL:-wss://mailbox.dinakernel.com}
      - DINA_APPVIEW_URL=${DINA_APPVIEW_URL:-https://appview.dinakernel.com}
      - DINA_HOOK_CALLBACK_TOKEN=${DINA_HOOK_CALLBACK_TOKEN:-}
      - DINA_KNOWN_PEERS=${DINA_KNOWN_PEERS:-}
      - DINA_ALLOWED_ENDPOINTS=${DINA_ALLOWED_ENDPOINTS:-}
    secrets:
      - wrapped_seed
      - identity_salt
      - seed_password
    depends_on:
      brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - dina-brain-net
    restart: unless-stopped

  brain:
    container_name: brain-${DINA_SESSION:-dna}
    build:
      context: ./brain
      dockerfile: Dockerfile
      args:
        DINA_VERSION: "${DINA_VERSION:-dev}"
    # No host port exposure — brain is internal-only, reachable via Docker network
    networks:
      - dina-brain-net
    volumes:
      - dina-data:/data
      - ./dina.html:/app/dina.html:ro
      - ./docs/images:/app/images:ro
      - ./models.json:/app/models.json:ro
      - ${DINA_SECRETS_DIR:-./secrets}/service_keys/brain:/run/secrets/service_keys/private
      - ${DINA_SECRETS_DIR:-./secrets}/service_keys/public:/run/secrets/service_keys/public:ro
    environment:
      - DINA_CORE_URL=http://core:8100
      - DINA_SERVICE_KEY_DIR=/run/secrets/service_keys
      - DINA_BRAIN_PORT=8200
      - DINA_LLM_URL=${DINA_LLM_URL:-}
      - DINA_LOG_LEVEL=${DINA_LOG_LEVEL:-INFO}
      - DINA_CLOUD_LLM=${DINA_CLOUD_LLM:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - DINA_OWNER_NAME=${DINA_OWNER_NAME:-}
      - DINA_TELEGRAM_TOKEN=${DINA_TELEGRAM_TOKEN:-}
      - DINA_TELEGRAM_ALLOWED_USERS=${DINA_TELEGRAM_ALLOWED_USERS:-}
      - DINA_TELEGRAM_ALLOWED_GROUPS=${DINA_TELEGRAM_ALLOWED_GROUPS:-}
      - DINA_BSKY_HANDLE=${DINA_BSKY_HANDLE:-}
      - DINA_BSKY_PASSWORD=${DINA_BSKY_PASSWORD:-}
      - DINA_BSKY_SERVICE=${DINA_BSKY_SERVICE:-https://bsky.social}
      - DINA_BSKY_OWNER_DID=${DINA_BSKY_OWNER_DID:-}
      - DINA_PDS_URL=${DINA_COMMUNITY_PDS_URL:-https://pds.dinakernel.com}
      - DINA_PDS_HANDLE=${DINA_COMMUNITY_PDS_HANDLE:-}
      - DINA_PDS_ADMIN_PASSWORD=${DINA_COMMUNITY_PDS_PASSWORD:-}
      - DINA_TIMEZONE=${DINA_TIMEZONE:-UTC}
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8200/healthz').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  llm:
    container_name: llm-${DINA_SESSION:-dna}
    image: ghcr.io/ggerganov/llama.cpp:server
    ports:
      - "${DINA_LLM_PORT:-8080}:8080"
    volumes:
      - dina-models:/models
    command: >
      --host 0.0.0.0
      --port 8080
      --model /models/${DINA_LLM_MODEL:-gemma-2b-it-q4_k_m.gguf}
      --ctx-size 4096
      --n-gpu-layers 999
    profiles:
      - local-llm
    restart: unless-stopped

networks:
  dina-brain-net:
    internal: false   # brain needs outbound for LLM APIs, Core needs outbound for community PDS

volumes:
  dina-data:
    driver: local
  dina-models:
    driver: local

secrets:
  wrapped_seed:
    file: ${DINA_SECRETS_DIR:-./secrets}/wrapped_seed.bin
  identity_salt:
    file: ${DINA_SECRETS_DIR:-./secrets}/master_seed.salt
  seed_password:
    file: ${DINA_SECRETS_DIR:-./secrets}/seed_password
